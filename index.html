<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPortal | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      /* Custom scrollbar for the student list section */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #334155;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 h-screen overflow-hidden transition-colors duration-300 font-sans"
  >
    <nav
      class="w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 h-[80px] flex items-center z-50"
    >
      <div
        class="max-w-[1600px] w-full mx-auto px-6 md:px-10 flex justify-between items-center"
      >
        <div>
          <h1
            class="text-3xl font-black tracking-tight text-slate-900 dark:text-white leading-none"
          >
            <span class="text-blue-600">Edu</span>Portal
          </h1>
          <p
            class="text-slate-500 dark:text-slate-400 text-xs font-medium mt-1"
          >
            Student Management Workspace
          </p>
        </div>

        <div class="flex items-center gap-6">
          <div class="hidden md:block text-right">
            <p
              class="text-sm font-bold text-blue-600 dark:text-blue-400"
              id="stats-count"
            >
              0 Students
            </p>
            <p class="text-[10px] uppercase tracking-widest text-slate-400">
              Database Active
            </p>
          </div>
          <button
            id="themeToggle"
            class="p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-lg border border-slate-200 dark:border-slate-700 hover:scale-110 transition-all"
          >
            <i
              data-lucide="sun"
              class="hidden dark:block text-yellow-400 w-5 h-5"
            ></i>
            <i
              data-lucide="moon"
              class="block dark:hidden text-slate-600 w-5 h-5"
            ></i>
          </button>
        </div>
      </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-6 md:p-10 h-[calc(100vh-80px)]">
      <div class="grid grid-cols-1 xl:grid-cols-12 gap-10 h-full">
        <section class="xl:col-span-4 h-full">
          <div
            class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 dark:border-slate-700 h-full flex flex-col"
          >
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
              <div class="p-2 bg-blue-600 rounded-lg text-white">
                <i data-lucide="user-plus" class="w-5 h-5"></i>
              </div>
              Registration
            </h2>

            <div class="space-y-4 flex-1 overflow-y-auto pr-2 custom-scrollbar">
              <div class="space-y-1">
                <label
                  class="text-[10px] font-bold text-slate-400 uppercase ml-1"
                  >Full Name</label
                >
                <input
                  type="text"
                  id="name"
                  placeholder="John Doe"
                  class="w-full px-4 py-3 rounded-xl border dark:bg-slate-900 dark:border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                />
              </div>

              <div class="space-y-1">
                <label
                  class="text-[10px] font-bold text-slate-400 uppercase ml-1"
                  >Roll Number</label
                >
                <input
                  type="text"
                  id="roll"
                  placeholder="2024-CSE-01"
                  class="w-full px-4 py-3 rounded-xl border dark:bg-slate-900 dark:border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                />
              </div>

              <div class="space-y-1">
                <label
                  class="text-[10px] font-bold text-slate-400 uppercase ml-1"
                  >Photo Preview</label
                >
                <div
                  class="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl p-4 text-center relative min-h-[140px] flex items-center justify-center bg-slate-50 dark:bg-slate-900/50"
                >
                  <input
                    type="file"
                    id="image"
                    accept="image/*"
                    class="absolute inset-0 opacity-0 cursor-pointer z-10"
                    onchange="previewImage(event)"
                  />

                  <div
                    id="preview-placeholder"
                    class="flex flex-col items-center"
                  >
                    <i
                      data-lucide="camera"
                      class="w-8 h-8 mb-2 text-slate-400"
                    ></i>
                    <p class="text-xs text-slate-400">Upload Image</p>
                  </div>

                  <img
                    id="image-preview"
                    class="hidden w-24 h-24 object-cover rounded-xl shadow-md border-2 border-blue-500"
                  />
                </div>
              </div>

              <div class="space-y-1">
                <label
                  class="text-[10px] font-bold text-slate-400 uppercase ml-1"
                  >Notes</label
                >
                <textarea
                  id="desc"
                  placeholder="Brief bio..."
                  class="w-full px-4 py-3 rounded-xl border dark:bg-slate-900 dark:border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none h-24 transition-all resize-none"
                ></textarea>
              </div>
            </div>

            <button
              onclick="addStudent()"
              class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-4 rounded-2xl shadow-lg shadow-blue-500/30 active:scale-[0.97] transition-all flex justify-center items-center gap-2"
            >
              <i data-lucide="plus-circle" class="w-5 h-5"></i>
              Register
            </button>
          </div>
        </section>

        <section class="xl:col-span-8 h-full flex flex-col">
          <div class="mb-6">
            <div class="relative w-full">
              <i
                data-lucide="search"
                class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"
              ></i>
              <input
                type="text"
                id="search"
                placeholder="Search students..."
                onkeyup="searchStudent()"
                class="w-full pl-14 pr-6 py-4 rounded-2xl border-none bg-white dark:bg-slate-800 shadow-xl shadow-slate-200/40 dark:shadow-none focus:ring-2 focus:ring-blue-500 outline-none text-lg"
              />
            </div>
          </div>

          <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar pb-10">
            <div
              id="studentList"
              class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-6"
            ></div>
          </div>
        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
