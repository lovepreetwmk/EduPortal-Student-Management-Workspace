<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Material Portal | Management Workspace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        };
    </script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: #cbd5e1; 
            border-radius: 10px; 
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        
        body { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen lg:h-screen lg:overflow-hidden font-sans">

    <nav class="sticky top-0 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800 h-[80px] flex items-center z-50">
        <div class="max-w-[1600px] w-full mx-auto px-6 md:px-10 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/30">
                    <i data-lucide="package"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter leading-none uppercase">
                        Material<span class="text-indigo-600">Portal</span>
                    </h1>
                    <p class="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest mt-1">Inventory Management</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="hidden md:block text-right border-r border-slate-200 dark:border-slate-700 pr-4">
                    <p class="text-sm font-bold text-indigo-600 dark:text-indigo-400" id="stats-count">0 Items</p>
                    <p class="text-[9px] uppercase font-medium text-slate-400">Database Active</p>
                </div>
                <button id="themeToggle" class="p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-lg border border-slate-200 dark:border-slate-700 hover:scale-110 transition-all">
                    <i data-lucide="sun" class="hidden dark:block text-yellow-400 w-5 h-5"></i>
                    <i data-lucide="moon" class="block dark:hidden text-slate-600 w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-4 md:p-8 lg:h-[calc(100vh-80px)]">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 h-full">
            
            <section class="lg:col-span-4 h-full">
                <div class="bg-white dark:bg-slate-800 p-6 md:p-8 rounded-[2.5rem] shadow-xl border border-slate-100 dark:border-slate-700 h-full flex flex-col">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-3">
                        <div class="p-2 bg-indigo-600 rounded-lg text-white">
                            <i data-lucide="plus-circle" class="w-5 h-5"></i>
                        </div>
                        Item Registration
                    </h2>

                    <div class="space-y-5 lg:flex-1 lg:overflow-y-auto pr-2 custom-scrollbar">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Product Photo</label>
                            <div class="group border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl p-4 text-center relative min-h-[140px] flex items-center justify-center bg-slate-50 dark:bg-slate-900/30 hover:border-indigo-400 transition-colors">
                                <input type="file" id="image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10" onchange="previewImage(event)" />
                                <div id="preview-placeholder" class="flex flex-col items-center">
                                    <i data-lucide="camera" class="w-8 h-8 mb-2 text-slate-400 group-hover:text-indigo-500 transition-colors"></i>
                                    <p class="text-xs text-slate-400 uppercase font-bold">Upload Image</p>
                                </div>
                                <img id="image-preview" class="hidden w-28 h-28 object-cover rounded-xl shadow-md border-2 border-indigo-500" />
                                <div id="edit-overlay" class="hidden absolute bottom-2 right-2 bg-black/60 backdrop-blur-md text-white px-2 py-1 rounded-lg text-[10px] z-20">Edit</div>
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Item Name</label>
                            <input type="text" id="name" placeholder="Enter product name" class="w-full px-4 py-3 rounded-xl border dark:bg-slate-900 dark:border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">SKU / Item Code</label>
                            <input type="text" id="roll" placeholder="E.g. ITEM-001" class="w-full px-4 py-3 rounded-xl border dark:bg-slate-900 dark:border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Description</label>
                            <textarea id="desc" placeholder="Material specs, weight, or notes..." class="w-full px-4 py-3 rounded-xl border dark:bg-slate-900 dark:border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none h-24 transition-all resize-none"></textarea>
                        </div>
                    </div>

                    <button onclick="addProduct()" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-500/30 active:scale-95 transition-all flex justify-center items-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i>
                        Register Item
                    </button>
                </div>
            </section>

            <section class="lg:col-span-8 h-full flex flex-col">
                <div class="mb-6">
                    <div class="relative w-full group">
                        <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-indigo-500"></i>
                        <input type="text" id="search" placeholder="Search by name, code or ID..." onkeyup="searchProduct()" 
                            class="w-full pl-14 pr-6 py-4 rounded-2xl border-none bg-white dark:bg-slate-800 shadow-xl shadow-slate-200/40 dark:shadow-none focus:ring-2 focus:ring-indigo-500 outline-none text-lg transition-all" />
                    </div>
                </div>

                <div class="lg:flex-1 lg:overflow-y-auto pr-2 custom-scrollbar pb-10">
                    <div id="productList" class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-6">
                        </div>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
