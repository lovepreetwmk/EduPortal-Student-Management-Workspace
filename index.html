<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaterialPortal | Inventory Management</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container nav-content">
        <div class="logo">Material<span>Portal</span></div>
        <div class="nav-right">
          <div class="stats" id="stats-display">0 Items In Stock</div>
          <button class="theme-btn" id="themeToggle">
            <span class="mode-text">Toggle Theme</span>
          </button>
        </div>
      </div>
    </nav>

    <main class="container main-layout">
      <aside class="sidebar">
        <div class="card form-card">
          <h2>New Item Entry</h2>

          <div class="form-group">
            <label>Product Image</label>
            <div
              class="upload-area"
              onclick="document.getElementById('imageInput').click()"
            >
              <input
                type="file"
                id="imageInput"
                accept="image/*"
                hidden
                onchange="previewImage(event)"
              />
              <div id="upload-placeholder">
                <div class="icon-placeholder">📸</div>
                <p>Click to Upload</p>
              </div>
              <img id="img-preview" src="" class="hidden-img" />
            </div>
          </div>

          <div class="form-group">
            <label>Item Name</label>
            <input
              type="text"
              id="itemName"
              placeholder="e.g., Industrial Valve"
            />
          </div>

          <div class="form-group">
            <label>Item Code / SKU</label>
            <input type="text" id="itemCode" placeholder="SKU-9901" />
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea
              id="itemDesc"
              placeholder="Enter specifications..."
            ></textarea>
          </div>

          <button class="submit-btn" onclick="addItem()">
            Add to Inventory
          </button>
        </div>
      </aside>

      <section class="content-area">
        <div class="search-container">
          <input
            type="text"
            id="searchInput"
            placeholder="Search by name or code..."
            onkeyup="searchItems()"
          />
        </div>

        <div class="product-grid" id="productGrid"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
